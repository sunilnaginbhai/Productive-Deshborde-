<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1cdf81a893.js" crossorigin="anonymous"></script>
    
</head>
<body>
    <img src="image/pexels-jess-vide-5007325.jpg" alt="" srcset="" id="background">
    <video id="back-video" autoplay loop muted  >
        <source id="video-source"  src="" type="video/mp4">
    </video>
    <div id="container">

        <div id="sidebar" class="all-card">
            <div class="menu">
                <i class="fa-solid fa-bars-staggered" style="color: rgb(0, 0, 0); width:35px; height: 35px;"></i>
            </div>
            <div class="features">
                <div id="icon1">
                    <i   class="fa-solid fa-cloud-rain" style="color: #87CEEB;width:40px; height: 40px;"></i>
                </div>
                <div id="icon2">
                 <i  class="fa-solid fa-calendar-check" style="color: rgb(5, 0, 164);width:40px; height: 40px;"></i>
                </div>
                <div id="icon3">
                    <i  class="fa-solid fa-clock" style="color: #F1C40F;width:40px; height: 40px;"></i>
                </div>
                <div id="icon4">
                    <i  class="fa-solid fa-calendar" style="color: #4285F4;width:40px; height: 40px;"></i>
                </div>
                <div id="icon5">
                    <i  class="fa-solid fa-bullseye" style="color: #0F9D58; width:40px; height: 40px;"></i>
                </div>
                <div id="icon6">
                    <i  class="fa-solid fa-ellipsis" style="color: rgb(0, 0, 0); width:40px; height: 40px;"></i>
                </div>
            </div>
        </div>
        <div id="top" class="all-card">
             <div id="motivation">
                 <h1 class="quote">"Action Eliminates Doubt"</h1>
                 <h1 class="quote">"Don't count the days, make the days count"</h1>
             </div>
            <iframe  id="date"  src="https://free.timeanddate.com/clock/iahpt79r/n423/fs45/fc666/tct/pct/ftb/tt1" frameborder="0" width="603" height="54" allowtransparency="true"></iframe>
             <iframe  id="clock" src="https://free.timeanddate.com/clock/iahppvek/n423/szw190/szh190/hbw0/cf100/hnceee" frameborder="0" width="190" height="190"></iframe>      
        </div>
        <div id="card1" class="all-card">
            <h1>Wether</h1> &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; 
            <img src="/image/Whether-svgs/clouds.svg" alt="" srcset=""> 
        </div>
        <div id="card2" class="all-card">
            <h1>Daily Planner </h1> &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; 
            <img style="width: 70px; height:70px;"  src="https://cdn-icons-png.flaticon.com/512/17487/17487679.png" alt="" srcset="">
        </div>
        <div id="card3" class="all-card">
            <h1>To-Do</h1>&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; 
            <img style="width: 60px; height:60px;"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Microsoft_To-Do_icon.svg/3840px-Microsoft_To-Do_icon.svg.png" alt="" srcset="">
        </div>
        <div id="card4" class="all-card">
            <h1>Daily Goals</h1>&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; 
            <img  style="width: 60px; height:60px;"  src="https://cdn-icons-png.flaticon.com/512/4624/4624170.png" alt="" srcset="">
        </div>
        <div id="card5" class="all-card">
           <h1>Pomodoro</h1>&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; 
            <img style="width: 60px; height:60px;" src="https://freesvg.org/img/pomodorotimer.png" alt="" srcset="">
        </div>
        <div id="card6" class="all-card">
            <h1>For More</h1>&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; 
            <img style="width: 60px; height:60px;"  src="https://www.svgrepo.com/show/457328/more.svg" alt="" srcset="">
        </div>
        <div id="right" class="all-card">
            <div class="dark">
                 <button class="dark-btn"></button>
            </div>
            <div class="theam">
                <button id="th1">
                    theme 1
                </button>
                <button id="th2">
                    theme 2
                </button>
                <button id="alltheme">
                    ALL theam
                </button>
                <button id="video-b">
                   play Video
                </button>
            </div>
        </div>
    </div> 
    <script src="script.js"></script>
</body>
</html>
