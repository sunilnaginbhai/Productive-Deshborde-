
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer App</title>
    <link rel="icon" href="images/pomodoro-timer-app.png" />
    <link rel="stylesheet" href="pomodoro.css" />
  </head>
  <body>
    <div class="timer-buttons">
      <button class="timer-btn pomodoro active" data-time="1500">
        Pomodoro
      </button>
      <button class="timer-btn short-break" data-time="300">Short Break</button>
      <button class="timer-btn long-break" data-time="900">Long Break</button>
    </div>

    <div class="circle">
      <div class="inner-circle">
        <div class="countdown">
          <h1></h1>
          <p class="play-pause"></p>
        </div>
      </div>
    </div>

    <script src="pomodoro.js"></script>
  </body>
</html>
