<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner - Professional Management System</title>
    <link rel="stylesheet" href="plan.css">
</head>
<body>
    <div class="app-container">
        
        <main class="main-content">
            <div class="top-header">
                <div class="header-title">
                    <h1>Daily Planning</h1>
            
                </div>
                <div class="header-controls">
                    <input type="text" class="search-input" placeholder="Search tasks...">
                </div>
            </div>

            <div class="add-task-panel">
                <div class="panel-row">
                    <input type="time" class="input-field time-field" placeholder="Time">
                    <input type="text" class="input-field task-field" placeholder="Task description...">
                    <select class="input-field priority-field">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    <input type="number" class="input-field duration-field" placeholder="Duration (min)" min="5" max="480">
                    <button class="add-task-btn">+ ADD TASK</button>
                </div>
            </div>

            <div class="tasks-container">
                <div class="task-item">
                    <div class="task-checkbox">
                        <input type="checkbox">
                    </div>
                    <div class="task-time">07:00</div>
                    <div class="task-main">
                        <div class="task-title">Wake up & morning routine</div>
                        <div class="task-meta">
                            <span class="tag category">Personal</span>
                            <span class="duration">45 min</span>
                        </div>
                    </div>
                    <div class="task-priority low">Low</div>
                    <div class="task-status">Pending</div>
                    <button class="task-action-btn">⋮</button>
                </div>

        </main>
    </div>

    <script src="plan.js"></script>
</body>
</html>
